# ─── DataSource (MySQL) ───
spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # ─── JPA ───
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

  # ─── H2 Console (prod 비활성) ───
  h2:
    console:
      enabled: false

# ─── Logging ───
logging:
  level:
    root: INFO
    nbc.c1oud_mall: INFO
