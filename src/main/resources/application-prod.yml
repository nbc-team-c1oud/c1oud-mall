# ─── DataSource (MySQL) ───
spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # ─── JPA ───
  # ddl-auto: update
  #   - 첫 부팅 시 엔티티 기반으로 RDS 테이블 자동 생성 (validate는 빈 DB에서 실패).
  #   - 이후 컬럼 추가는 ALTER로 반영, DROP·MODIFY는 절대 안 함 → 데이터 안전.
  #   - 운영 안정화 후 Flyway 도입하면서 다시 validate로 되돌릴 예정.
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

 #  ─── H2 Console (prod 비활성) ───
  h2:
    console:
      enabled: false

# ─── Logging ───
logging:
  level:
    root: INFO
    nbc.c1oud_mall: INFO

# ─── super-admin ───
super-admin:
  email: ${SUPER_ADMIN_EMAIL}
  password: ${SUPER_ADMIN_PASSWORD}