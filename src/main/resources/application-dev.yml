# ─── DataSource (H2 in-memory, MySQL 호환 모드) ───
spring:
  datasource:
    url: jdbc:h2:mem:c1oud_mall;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ─── JPA ───
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ─── H2 Console ───
  h2:
    console:
      enabled: true
      path: /h2-console

# ─── Logging ───
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
