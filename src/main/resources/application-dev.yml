# ─── DataSource (H2 in-memory, MySQL 호환 모드) ───
spring:
  datasource:
    url: jdbc:h2:mem:c1oud_mall;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ─── JPA ───
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ─── H2 Console ───
  h2:
    console:
      enabled: true
      path: /h2-console

# ─── Logging ───
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# ─── super-admin ───
# 운영은 환경변수로 오버라이드. 로컬·테스트는 placeholder 기본값으로 빈 컨텍스트 부팅 가능.
super-admin:
  email: ${SUPER_ADMIN_EMAIL:super-admin-dev@example.com}
  password: ${SUPER_ADMIN_PASSWORD:dev-super-admin-password}

# ─── JWT (dev 기본값) ───
# application.yml의 ${JWT_SECRET}이 dev 프로파일에선 본 값으로 해소.
jwt:
  secret: ${JWT_SECRET:dev-jwt-secret-for-local-and-test-environment-only}
